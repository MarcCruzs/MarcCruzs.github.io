<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marc Cruz | Full-Stack Engineer · Portfolio & Resume</title>
    <meta name="description" content="Full-stack engineer — Python, TypeScript, React, ML/data pipelines. NASA R&D, UAV competition lead, GPU computing. Portfolio for hiring managers and recruiters." />
    <meta property="og:title" content="Marc Cruz | Full-Stack Engineer · Portfolio & Resume" />
    <meta property="og:description" content="Full-stack engineer with NASA R&D and ML research experience. Portfolio for hiring managers." />
    <meta property="og:type" content="profile" />
    <meta property="og:url" content="https://marccruzs.com" />

    <!-- Variable font preloads — prevent FOUT for display + body -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/node_modules/@fontsource-variable/fraunces/files/fraunces-latin-wght-normal.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/node_modules/@fontsource-variable/inter/files/inter-latin-wght-normal.woff2"
    />

    <!-- Preload LCP hero image so it ships before JS evaluation -->
    <link
      rel="preload"
      as="image"
      href="/images/hero/hero-1440w.webp"
      type="image/webp"
      imagesrcset="/images/hero/hero-390w.webp 390w, /images/hero/hero-820w.webp 820w, /images/hero/hero-1440w.webp 1440w, /images/hero/hero-2560w.webp 2560w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Marc Cruz",
      "jobTitle": "Full-Stack Software Engineer",
      "description": "Full-stack engineer with experience in Python, TypeScript, React, machine learning, and data pipelines. NASA R&D contributor, UAV competition software lead.",
      "url": "https://marccruzs.com",
      "email": "marc.cruz.office@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Orange County",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "knowsAbout": ["Full-Stack Development", "Python", "TypeScript", "React", "Machine Learning", "Data Pipelines", "ETL", "PyTorch", "TensorFlow", "CUDA"]
    }
    </script>
    <script>
      // Restore saved theme before first paint to avoid flash.
      // Stored value ('dark'|'light') wins; otherwise fall back to OS preference.
      try {
        const t = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (t === null && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
      // Restore accessibility prefs before first paint
      try {
        const a = JSON.parse(localStorage.getItem('a11y-prefs') || '{}');
        const h = document.documentElement.classList;
        if (a.fontSize === 1) h.add('a11y-font-lg');
        if (a.fontSize === 2) h.add('a11y-font-xl');
        if (a.highContrast) h.add('a11y-high-contrast');
        if (a.reduceMotion) h.add('a11y-reduce-motion');
        if (a.dyslexiaFont) h.add('a11y-dyslexia');
        if (a.focusHighlight) h.add('a11y-focus-highlight');
        if (a.lineHeight) h.add('a11y-line-height');
      } catch (_) {}
    </script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="4528afb9-248b-4f1b-a597-cd8e09fc2717"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
